<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>中國象棋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">中 國 象 棋</h1>
    </header>

    <!-- Main: Board + Sidebar -->
    <div class="main-content">
      <!-- Board (left) -->
      <div class="board-section">
        <div class="board-frame">
          <canvas id="gameCanvas"></canvas>
        </div>
        <div class="ai-thinking" id="aiThinking" style="display:none">
          <div class="ai-thinking-bar" id="aiThinkingBar"></div>
          <span class="ai-thinking-label">AI 思考中...</span>
        </div>
      </div>

      <!-- Sidebar (right) -->
      <div class="sidebar">
        <!-- Status -->
        <div class="status-row">
          <span class="turn-dot" id="turnDot"></span>
          <span class="turn-label" id="turnLabel">红方走棋</span>
          <span class="status-text" id="statusText">点击棋子开始</span>
        </div>

        <!-- Difficulty -->
        <div class="diff-group">
          <span class="diff-label">难度</span>
          <button class="diff-btn" data-diff="1">初学</button>
          <button class="diff-btn active" data-diff="2">进阶</button>
          <button class="diff-btn" data-diff="3">大师</button>
        </div>

        <!-- AI Hint -->
        <div class="hint-panel">
          <div class="hint-header">
            <span class="hint-title">走法提示</span>
            <button class="hint-refresh" id="hintRefresh" title="刷新分析">⟳</button>
          </div>
          <div class="hint-body">
            <div class="hint-move" id="hintMove">—</div>
            <div class="hint-eval-bar-wrap">
              <div class="hint-eval-bar">
                <div class="hint-eval-fill" id="hintEvalFill"></div>
                <div class="hint-eval-divider"></div>
              </div>
              <span class="hint-eval-score" id="hintEvalScore">0.00</span>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="actions-row">
          <button class="action-btn" id="btnNewGame">🔄 新局</button>
          <button class="action-btn" id="btnUndo">↩ 悔棋</button>
          <button class="action-btn" id="btnSound">🔊 音效</button>
        </div>

        <!-- Captured -->
        <div class="captured-row">
          <span class="captured-label">红方失:</span>
          <span class="captured-items" id="capturedRed"></span>
        </div>
        <div class="captured-row">
          <span class="captured-label">黑方失:</span>
          <span class="captured-items" id="capturedBlack"></span>
        </div>

        <!-- Move History (fills remaining sidebar space) -->
        <div class="history-section">
          <div class="history-header">走法记录</div>
          <div class="history-list" id="moveHistory">
            <span class="history-empty">对局尚未开始</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
